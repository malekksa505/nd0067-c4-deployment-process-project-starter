version: 2.1

orbs:
  # orgs contain basic recipes and reproducible actions
  node: circleci/node@5.0.2
  eb: circleci/aws-elastic-beanstalk@2.0.1
  aws-cli: circleci/aws-cli@3.1.1

jobs:
  build:
    docker:
      - image: "cimg/node:14.15"
    steps:
      - node/install:
          node-version: "14.15"
      - checkout
      # Use root level package.json to install dependencies in the frontend app
      - run:
          name: Install Front-End Dependencies
          command: |
            npm run frontend:install
      # Install dependencies in the backend API
      - run:
          name: Install API Dependencies
          command: |
            npm run api:install
      # Lint the frontend
      - run:
          name: Front-End Lint
          command: |
            npm run frontend:lint
      # Build the frontend app
      - run:
          name: Front-End Build
          command: |
            npm run frontend:build
      # Build the backend API
      - run:
          name: API Build
          command: |
            npm run api:build

  deploy:
    docker:
      - image: "cimg/base:stable"
    steps:
      - node/install:
          node-version: "14.15"
      - eb/setup
      - aws-cli/setup
      - checkout
      - run:
          name: Set Environment Variables on Elastic Beanstalk
          command: |
            cd udagram/udagram-api
            eb init udagram-api --platform "Node.js 22 running on 64bit Amazon Linux 2023" --region us-east-1
            eb use udagram-api-dev
            eb setenv POSTGRES_USERNAME=$POSTGRES_USERNAME \
                   POSTGRES_PASSWORD=$POSTGRES_PASSWORD \
                   POSTGRES_HOST=$POSTGRES_HOST \
                   POSTGRES_DB=$POSTGRES_DB \
                   AWS_BUCKET=$AWS_BUCKET \
                   AWS_REGION=$AWS_REGION \
                   JWT_SECRET=$JWT_SECRET \
                   URL=$URL
      - run:
          name: Deploy App
          # This runs the root package.json script which triggers both frontend and api deploys
          command: |
            npm run deploy

workflows:
  udagram:
    jobs:
      - build
      - hold:
          filters:
            branches:
              only:
                - master
          type: approval
          requires:
            - build
      - deploy:
          requires:
            - hold